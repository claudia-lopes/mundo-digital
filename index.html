<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digivice | Claudia Leonardo Lopes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
	 <link rel="stylesheet" href="styles.css">

</head>
<body>

    <nav class="navbar border-b border-sky-900/50 py-4 sticky-top bg-slate-950/80 backdrop-blur-xl z-50">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-sky-500 rounded-full animate-pulse"></div>
                <h1 class="text-xl font-bold tracking-widest text-white m-0 uppercase">Digi<span class="text-sky-400">Virtual</span></h1>
            </div>
            <div class="w-full max-w-lg">
                <input type="text" id="searchInput" class="form-control bg-slate-900 border-sky-900 text-white p-3 rounded-xl focus:border-sky-400 focus:ring-1 focus:ring-sky-400 shadow-inner" placeholder="Aguardando comando de busca...">
            </div>
        </div>
    </nav>

    <main class="container my-10 min-h-screen">
        <div class="row g-4" id="digiContainer">
            <div class="col-12 text-center py-20" id="loading">
                <div class="spinner-grow text-sky-500" role="status"></div>
                <p class="mt-4 neon-font text-sky-400 animate-pulse tracking-tighter uppercase">Sincronizando Banco de Dados...</p>
            </div>
        </div>
    </main>

    <footer class="py-8 mt-20">
        <div class="container text-center">
            <p class="font-bold tracking-widest text-slate-300">© 2026 CLAUDIA LEONARDO LOPES</p>
            <div class="mt-2 text-[10px] text-sky-900 font-bold uppercase tracking-[0.3em]">Todos os Direitos Reservados</div>
        </div>
    </footer>

    <div class="modal fade" id="digiModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" id="modalContent">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
